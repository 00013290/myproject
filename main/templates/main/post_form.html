{% extends 'main/base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-8">
        <h2>{{ action }} Post</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">{{ action }}</button>
            <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
